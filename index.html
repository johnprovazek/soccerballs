<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>soccerballs</title>
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <div id="soccer-ball-viewer">
      <div id="loading-symbol" class="center-square">
        <svg id="loading-symbol-svg" viewBox="0 0 100 100" style="display: block">
          <circle
            stroke-dasharray="94.24777960769379 33.41592653589793"
            r="20"
            stroke-width="4"
            stroke="black"
            fill="none"
            cy="50"
            cx="50"
          ></circle>
        </svg>
      </div>
      <div id="soccer-ball-background" class="center-square"></div>
      <div id="soccer-ball-button-prev" class="soccer-ball-button disabled">
        <svg viewBox="0 0 24 24">
          <g>
            <path
              fill="white"
              d="M 13.364 5.175 6.539 12 l 6.825 6.825 2.050 -2.050 L 10.639 12 l 4.775 -4.775 -2.050 -2.050 z"
              stroke="black"
              stroke-width="0.9"
              style="stroke-linecap: round; stroke-linejoin: round"
            />
          </g>
        </svg>
      </div>
      <div id="soccer-ball-button-next" class="soccer-ball-button disabled">
        <svg viewBox="0 0 24 24">
          <g>
            <path
              fill="white"
              d="M 8.586 7.225 13.361 12 l -4.775 4.775 2.05 2.05 L 17.461 12 l -6.825 -6.825 -2.05 2.05 z"
              stroke="black"
              stroke-width="0.9"
              style="stroke-linecap: round; stroke-linejoin: round"
            />
          </g>
        </svg>
      </div>
      <div id="soccer-ball-name">
        <svg viewBox="0 0 240 24" preserveAspectRatio="xMidYMax" xmlns="http://www.w3.org/2000/svg">
          <text
            id="soccer-ball-name-text"
            fill="white"
            font-size="24"
            text-anchor="middle"
            dominant-baseline="middle"
            x="120"
            y="14.6"
            font-family="Courier"
            stroke="black"
            stroke-width="2"
            paint-order="stroke"
            style="paint-order: stroke"
          ></text>
        </svg>
      </div>
    </div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
